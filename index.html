<style id="first-run-splash-style">
  #first-run-splash {
    position: fixed; inset: 0; z-index: 99999;
    background: #f5ede1;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0;
    transition: opacity 1s ease;
    
  }
  #first-run-splash .fr-line {
    font-family: "Great Vibes", cursive;
    -webkit-text-stroke: .3px rgba(230,230,230,.9);
    text-shadow: 1px 1px 12px rgba(0,0,0,1);
    color: #fafafa;
    line-height: 1.1;
  }
  #first-run-splash .fr-line.fr-mid { color: #e07a3f; }
  #first-run-splash .fr-les    { font-size: 15vw; }
  #first-run-splash .fr-mid    { font-size: 17vw; }
  #first-run-splash .fr-sauces { font-size: 15vw; }
  #first-run-splash .fr-version {
    font-family: "Play", sans-serif;
    color: #6e5f50;
    font-size: 16px;
    margin-top: 24px;
  }
  #first-run-splash.fr-hide { opacity: 0; pointer-events: none; }
</style>
</head>

<div id="first-run-splash">

  <div class="fr-version">ver. 1.6.0</div>
</div>

<script>
  (function() {
    var splash = document.getElementById('first-run-splash');
    window.addEventListener('load', function() {
      setTimeout(function() {
        splash.classList.add('fr-hide');
        setTimeout(function(){ splash.remove(); }, 2000);
      }, 6000);
    });
  })();
</script>
